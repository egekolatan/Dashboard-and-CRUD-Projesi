<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolatan Portal - Giriş Yap & Kayıt Ol</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- CSS Dosyası -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 1. GİRİŞ VE KAYIT EKRANI (Kimlik Doğrulama) -->
    <div class="auth-wrapper" id="auth-section">
        <!-- Floating Backdrop Blobs -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo" style="display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 0.85rem;">
                    <svg viewBox="0 0 24 24" class="logo-icon" style="width: 2.2rem; height: 2.2rem; color: var(--accent-color); filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.45)); animation: float 3s ease-in-out infinite;">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="logo-text" style="font-family: var(--font-title); font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Kolatan</span>
                </div>
                <p>Devam etmek için bilgilerinizi girin.</p>
            </div>

            <!-- Sekmeler (Giriş / Kayıt) -->
            <div class="auth-tabs">
                <button type="button" class="auth-tab-btn active" id="tab-login">Giriş Yap</button>
                <button type="button" class="auth-tab-btn" id="tab-register">Kayıt Ol</button>
            </div>

            <!-- Giriş Formu -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">E-posta Adresi</label>
                    <input type="email" id="login-email" required placeholder="egekolatan114@gmail.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Şifre</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" required placeholder="••••••••">
                        <button type="button" id="toggle-password" class="toggle-password-btn"
                            aria-label="Şifreyi Göster">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke-width="1.5" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between; margin: 0.5rem 0; font-size: 0.85rem;">
                    <label style="display: flex; align-items: center; gap: 0.4rem; cursor: pointer; color: var(--text-secondary);">
                        <input type="checkbox" id="login-remember" style="width: auto; cursor: pointer;"> Beni Hatırla
                    </label>
                    <a href="#" id="forgot-password-link" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Şifremi Unuttum</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Giriş Yap</button>
            </form>

            <!-- Kayıt Formu -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-name">Ad Soyad</label>
                    <input type="text" id="register-name" required placeholder="Örn: Hello World Yazılım Akademi ">
                </div>
                <div class="form-group">
                    <label for="register-email">E-posta Adresi</label>
                    <input type="email" id="register-email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="register-password">Şifre</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-password" required placeholder="••••••••">
                        <button type="button" id="toggle-reg-password" class="toggle-password-btn"
                            aria-label="Şifreyi Göster">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                stroke-width="1.5" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Kayıt Ol</button>
            </form>


            <!-- Bildirim Mesajı Alanı -->
            <div class="alert-message" id="auth-alert"></div>
        </div>
    </div>

    <!-- 4. ŞİFRE SIFIRLAMA MODAL PENCERESİ -->
    <div class="modal-wrapper" id="reset-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div class="modal-card" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 100%; max-width: 400px; padding: 2rem; box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 1.25rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem;">
                <h3 style="font-family: var(--font-title); font-weight: 700; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Şifremi Unuttum</h3>
                <button type="button" style="background: none; border: none; font-size: 1.5rem; color: var(--text-secondary); cursor: pointer;" id="close-reset-btn">&times;</button>
            </div>
            <form id="reset-password-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="form-group">
                    <label for="reset-name">Adınız Soyadınız</label>
                    <input type="text" id="reset-name" required placeholder="Ege Kolatan">
                </div>
                <div class="form-group">
                    <label for="reset-email">E-posta Adresiniz</label>
                    <input type="email" id="reset-email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="reset-new-password">Yeni Şifre</label>
                    <input type="password" id="reset-new-password" required placeholder="••••••••">
                </div>
                <div class="modal-actions" style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 0.5rem;">
                    <button type="button" class="btn btn-secondary" id="cancel-reset-btn">Vazgeç</button>
                    <button type="submit" class="btn btn-primary">Şifreyi Güncelle</button>
                </div>
            </form>
            <div class="alert-message" id="reset-alert" style="margin-top: 0.5rem;"></div>
        </div>
    </div>

    <!-- JS Mantığı -->
    <script src="app.js"></script>
</body>
</html>
