<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimlik Doğrulamalı Ürün Yönetimi</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- CSS Dosyası -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 1. GİRİŞ VE KAYIT EKRANI (Kimlik Doğrulama) -->
    <div class="auth-wrapper" id="auth-section">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">📦</div>
                <h2>Sistem Girişi</h2>
                <p>Devam etmek için yönetici bilgilerinizi girin.</p>
            </div>

            <!-- Giriş Formu -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">E-posta Adresi</label>
                    <input type="email" id="login-email" required placeholder="egekolatan114@gmail.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Şifre</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" required placeholder="••••••••">
                        <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Şifreyi Göster">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Giriş Yap</button>
            </form>


            <!-- Bildirim Mesajı Alanı -->
            <div class="alert-message" id="auth-alert"></div>
        </div>
    </div>


    <!-- 2. ANA UYGULAMA EKRANI (Ürün Yönetim Paneli - CRUD) -->
    <div class="app-wrapper hidden" id="app-section">
        <!-- Üst Menü / Header -->
        <header class="app-header">
            <div class="header-logo">
                <span class="logo-icon">📦</span>
                <h1>StokTakip</h1>
            </div>
            <div class="header-user">
                <span class="welcome-text">Hoş geldiniz, <strong id="user-display-name">Kullanıcı</strong></span>
                <button class="btn btn-danger btn-sm" id="logout-btn">Çıkış Yap</button>
            </div>
        </header>

        <div class="app-container">
            <!-- Sol Sütun: Form Ekleme -->
            <aside class="form-sidebar card">
                <h3>Yeni Ürün Ekle</h3>
                <form id="product-form" class="crud-form">
                    <div class="form-group">
                        <label for="prod-name">Ürün Adı</label>
                        <input type="text" id="prod-name" required placeholder="Örn: Kablosuz Mouse">
                    </div>
                    <div class="form-group">
                        <label for="prod-category">Kategori</label>
                        <select id="prod-category">
                            <option value="Elektronik">Elektronik</option>
                            <option value="Ofis/Kırtasiye">Ofis/Kırtasiye</option>
                            <option value="Giyim">Giyim</option>
                            <option value="Ev/Yaşam">Ev/Yaşam</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="prod-price">Fiyat (₺)</label>
                            <input type="number" id="prod-price" required min="0.01" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="prod-stock">Stok Adedi</label>
                            <input type="number" id="prod-stock" required min="0" step="1" placeholder="0">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Ekle</button>
                </form>
            </aside>

            <!-- Sağ Sütun: Liste ve Araçlar -->
            <main class="list-content">
                <!-- Filtreler ve Veri Dışa/İçe Aktarma Çubuğu -->
                <div class="control-bar card">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Ürün adı ile ara...">
                    </div>
                    <div class="category-filter">
                        <select id="filter-category">
                            <option value="Hepsi">Tüm Kategoriler</option>
                            <option value="Elektronik">Elektronik</option>
                            <option value="Ofis/Kırtasiye">Ofis/Kırtasiye</option>
                            <option value="Giyim">Giyim</option>
                            <option value="Ev/Yaşam">Ev/Yaşam</option>
                            <option value="Diğer">Diğer</option>
                        </select>
                    </div>
                    <div class="data-actions">
                        <!-- Dışa aktar butonu -->
                        <button class="btn btn-secondary btn-sm" id="export-json-btn"
                            title="Verileri JSON dosyası olarak indir">Veriyi Çek (JSON)</button>
                        <!-- İçe aktar butonu ve gizli input dosyası -->
                        <label for="import-file" class="btn btn-secondary btn-sm"
                            title="JSON dosyası yükleyerek veriyi içe aktar">Veri Yükle</label>
                        <input type="file" id="import-file" accept=".json" class="hidden">
                    </div>
                </div>

                <!-- Ürün Tablosu -->
                <div class="table-container card">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>Ürün Adı</th>
                                <th>Kategori</th>
                                <th>Fiyat</th>
                                <th>Stok</th>
                                <th>Ekleyen</th>
                                <th>İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="product-table-body">
                            <!-- JS dinamik olarak dolduracak -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- 3. ÜRÜN GÜNCELLEME MODAL PENCERESİ -->
    <div class="modal-wrapper" id="edit-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Ürünü Düzenle</h3>
                <button class="close-btn" id="close-modal-btn">&times;</button>
            </div>
            <form id="edit-product-form" class="crud-form">
                <!-- Güncellenen ürünün idsini saklamak için gizli girdi -->
                <input type="hidden" id="edit-prod-id">

                <div class="form-group">
                    <label for="edit-prod-name">Ürün Adı</label>
                    <input type="text" id="edit-prod-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-prod-category">Kategori</label>
                    <select id="edit-prod-category">
                        <option value="Elektronik">Elektronik</option>
                        <option value="Ofis/Kırtasiye">Ofis/Kırtasiye</option>
                        <option value="Giyim">Giyim</option>
                        <option value="Ev/Yaşam">Ev/Yaşam</option>
                        <option value="Diğer">Diğer</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-prod-price">Fiyat (₺)</label>
                        <input type="number" id="edit-prod-price" required min="0.01" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="edit-prod-stock">Stok Adedi</label>
                        <input type="number" id="edit-prod-stock" required min="0" step="1">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-modal-btn">Vazgeç</button>
                    <button type="submit" class="btn btn-primary">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JS Mantığı -->
    <script src="app.js"></script>
</body>

</html>
