<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<style>
    body {
        min-height: 100vh;
        background-color: bisque;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    img {
        width: 100%;
    }

    .container {
        width: 20%;
        height: 400px;
        background-color: white;
        padding: 15px;
        border-radius: 10px;
    }

    h1 {
        font-size: 15px;
        text-align: center;
    }

    .qr {
        border-radius: 10px;
        overflow: hidden;
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
        font-weight: 700px;
        font-style: normal;
    }

    p {
        font-size: 20px;
        text-align: center;
        font-family: "Outfit", sans-serif;
        font-optical-sizing: auto;
        font-weight: 400px;
        font-style: normal;
    }
</style>

<body>
    <div class="container">
        <div class="qr">
            <img src="./Qrcode-PNG.png" alt="">
        </div>
        <div class="content">
            <h1>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ea, reiciendis.</h1>
            <p>Ege Kolatan</p>
        </div>
    </div>
</body>

</html>
