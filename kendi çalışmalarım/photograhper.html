<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=,, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        div{
            width: 100%;
            height: 400px;
        }
        img{
            width: 100%;
            height: 100%;
        }
        .hero-img{
            position: relative;
        }
        .text{
            position: absolute;
            top: 50%;
            left: 50%;
            color: white;
            transform: translate(-50%,-50%);
            text-align: center;
        }
        button{
            padding: 10px;
            border-radius: 5px;
        }
        button:hover{
            background-color: grey;
            color: white;
        }
        .yeni{
            margin: 15px 0;
        }

    </style>
</head>
<body>
    <div class="hero-img">
          <img src="./camera.jpg" alt="">
    </div>
    <div class="text">
        <h2 class="yeni">I am Joe Doe</h2>
        <p class="yeni">I am a Photograhper</p>
        <button class="yeni">Here Me</button>
    </div>
</body>
</html>
