<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraTech Store - Premium Alışveriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom navbar-light">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-primary d-flex align-items-center" href="index.html">
                <i class="fa-solid fa-bolt me-2"></i>AuraTech
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <div class="mx-auto my-3 my-lg-0 w-50">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 rounded-start-pill text-muted">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" id="arama-input" class="form-control border-start-0 rounded-end-pill py-2" placeholder="Ürün ara..." oninput="urunleriAra()">
                    </div>
                </div>
                <div class="d-flex align-items-center">
                    <a href="sepet.html" class="btn btn-outline-primary position-relative rounded-pill px-4 py-2 fw-semibold">
                        <i class="fa-solid fa-cart-shopping me-2"></i>Sepetim
                        <span id="sepet-sayac" class="cart-badge">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-gradient text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Geleceğin Teknolojisi, Bugün Kapınızda</h1>
            <p class="lead opacity-75">Özenle seçilmiş premium teknoloji ürünleri ve aksesuarları keşfedin.</p>
        </div>
    </header>

    <main class="container my-5">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8 mb-3 mb-md-0">
                <div class="d-flex gap-2 flex-wrap" id="kategori-filtreleri">
                    <button class="filter-btn active" onclick="kategoriFiltrele('hepsi', this)">Tüm Ürünler</button>
                    <button class="filter-btn" onclick="kategoriFiltrele('teknoloji', this)">Teknoloji</button>
                    <button class="filter-btn" onclick="kategoriFiltrele('aksesuar', this)">Aksesuar</button>
                    <button class="filter-btn" onclick="kategoriFiltrele('giyilebilir', this)">Giyilebilir</button>
                </div>
            </div>
            <div class="col-md-4 text-md-end">
                <select id="sirala-select" class="form-select rounded-pill px-3 py-2" onchange="urunleriSirala()">
                    <option value="varsayilan">Varsayılan Sıralama</option>
                    <option value="fiyat-artan">Fiyat: Düşükten Yükseğe</option>
                    <option value="fiyat-azalan">Fiyat: Yüksekten Düşüğe</option>
                    <option value="puan-azalan">Müşteri Puanı</option>
                </select>
            </div>
        </div>

        <div class="row g-4" id="urunler-container"></div>
    </main>

    <!-- Bildirim -->
    <div id="bildirim-kutusu" style="
        display:none;
        position:fixed;
        bottom:24px;
        right:24px;
        background:#10b981;
        color:white;
        padding:14px 22px;
        border-radius:12px;
        font-weight:600;
        z-index:9999;
        box-shadow:0 4px 16px rgba(0,0,0,0.15);
        font-family:'Outfit',sans-serif;
    ">
        <i class="fa-solid fa-circle-check me-2"></i> Ürün sepete eklendi!
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Eski scripti önbellekten temizle ve yeni versiyonu yükle
        var s = document.createElement('script');
        s.src = 'script.js?v=' + new Date().getTime();
        document.head.appendChild(s);
    </script>
</body>
</html>
