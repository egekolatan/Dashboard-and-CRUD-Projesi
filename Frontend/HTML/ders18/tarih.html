<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- köşeli parantez dizi için kullanılır -->
     <!-- normal parantez fonk. belirtir -->
      <!-- süslü parantez ya dizi içindeki objeleri tanımlar yada fonk. döngü koşulların işlemlerini belirtmek için kullanılır -->
    

    <script>
        let tarih=new Date()
        console.log(tarih)
        let year=tarih.getFullYear()
        let day=tarih.getDay()
        let month=tarih.getMonth()
        let hours=tarih.getHours()
        let minute=tarih.getMinutes()
        let second=tarih.getSeconds()
        console.log(`${year}  -${day}-${month+1} -${hours}-${minute}-${second}`)
    </script>
</body>
</html>
