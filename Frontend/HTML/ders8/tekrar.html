<head>

    <style>
        button:hover{
            padding: 10px;
            border-radius: 5px;
            background-color: blue;
            color: white;
            border-color: red;
        }
        p:nth-child(2){
            color: red;
        }
        button:active{
            background-color: pink;
        }
        input:focus{
            background-color: red;
            color: white;
        }
        /* p:not(.deneme){

        } */
        

    </style>
</head>
<body>
    <!-- text-transform,table,pesudo classlar. -->
     <!-- hover örneği buttonun üstüne geldiğimizde olan renkler verdiğimiz elementler yada -->
      <!-- active de sadece basılı tuttuğumuzda oluyor -->
       <!-- focus örneğide aynı şekilde bastğımızda rengi değişir -->
        <!-- not.deneme örneğinde o hariç hepsinin rengini aynı yapıyor -->
