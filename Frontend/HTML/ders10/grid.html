<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            border: 1px solid black;
        }

        .container {
            display: grid;
            grid-template-columns: 100px 200px 300px;
            grid-template-rows: 100px 300px 200px;
            gap: 5px;
            justify-content: space-between;
            /* justify conntent hem dipslya flex hemde displya gridde kullanılabilir */
            /* yapılar arası boşluk oluşturur */
            /* satıra göre boyutlanmasını sağlar rows*/
            /* stüna göre boyutlanıp şekillenmesini sağlar columns */
        }
    </style>
</head>

<body>
    <div class="container">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>

</html>
