<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link rel="stylesheet" href="tekrar.css">
    <style>
        h1 {
            color: darkgreen;
        }
    </style>
    <!--Mesela üstteki bir örnek head etiketinin üstüne yazılır css'tir ayrı bir css şeyi açıp gene yazabilirim ama o zaman klink etiketini kullanmam gerekiyor-->
</head>

<body>
    <div>
        <h1>CSS Tipleri</h1>
        <p>inline-internal-extarnal</p>
        <p>inline satır içi style attribute yazılan css</p>
        <p>internal aynı html dosyasının içinde head etiketleri arasında style etiketinin içerisnde yazılan csstir</p>
        <p>external ayrı bir css dosyası oluşturup head etiketleri arasına
            link ile çağırılan csstir
        </p>
    </div>
</body>

</html>
