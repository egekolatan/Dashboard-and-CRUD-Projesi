<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    


    <script>
        let x=Number(prompt("lütfen birinci sayıyı giriniz"))
        let y=Number(prompt("lütfen ikinci sayıyı giriniz"))
        if(x>y){
            alert(x-y)
        }else if(x==y){
                alert(x*y)

        }else if(x<y){
            alert(x+y)
        }
         
    </script>
</body>
</html>
