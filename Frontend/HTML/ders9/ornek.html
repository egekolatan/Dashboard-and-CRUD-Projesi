<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        img{
            width: 100%;
            height: 100%;
        }
        .hero{
            width: 100%;
            height: 300px;
            position: relative;
        }
        .text{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="./aslan.jpg" alt="">
        <div class="text">
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. A, harum!</p>
        </div>
    </div>
</body>
</html>
