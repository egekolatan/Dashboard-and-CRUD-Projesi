<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Durumu</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: linear-gradient(135deg, #1f4068, #162447, #0f1a1c);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --accent-color: #00adb5;
            --accent-hover: #00fff5;
            --input-bg: rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--primary-bg);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .weather-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 35px 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .weather-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-box input {
            flex: 1;
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-color);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 173, 181, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: var(--accent-color);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .search-box button:hover {
            background: var(--accent-hover);
            color: #0f1a1c;
            box-shadow: 0 0 15px rgba(0, 255, 245, 0.4);
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.8s ease-in-out;
        }

        #city {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            word-wrap: break-word;
        }

        #temp {
            font-size: 58px;
            font-weight: 300;
            color: #ffffff;
            margin: 5px 0;
            line-height: 1;
        }

        #description {
            font-size: 17px;
            font-weight: 400;
            color: var(--text-muted);
            text-transform: capitalize;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustments for mobile devices */
        @media (max-width: 400px) {
            .weather-container {
                padding: 25px 15px;
            }

            .search-box {
                flex-direction: column;
                gap: 8px;
            }

            .search-box input, .search-box button {
                width: 100%;
                font-size: 15px;
                padding: 10px 14px;
            }

            #city {
                font-size: 22px;
            }

            #temp {
                font-size: 48px;
            }

            #description {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="weather-container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Şehir adı yazın...">
            <button id="searchBtn">Ara</button>
        </div>

        <div class="weather-info">
            <h1 id="city">Yükleniyor...</h1>
            <p id="temp">Yükleniyor...</p>
            <p id="description">Yükleniyor...</p>
        </div>
    </div>

    <script>
        const API_KEY = "28c43502b67ebdfcd30e6eab3aaadab8";

        function getWeather(sehir) {
            if (!sehir) return;

            document.getElementById("city").textContent = "Yükleniyor...";
            document.getElementById("temp").textContent = "...";
            document.getElementById("description").textContent = "Yükleniyor...";

            const URL = `https://api.openweathermap.org/data/2.5/weather?q=${sehir}&appid=${API_KEY}&units=metric&lang=tr`;

            fetch(URL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Şehir bulunamadı veya bir hata oluştu.");
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById("city").textContent = `${data.name}, ${data.sys.country}`;
                    document.getElementById("temp").textContent = `${Math.round(data.main.temp)}°C`;
                    document.getElementById("description").textContent = data.weather[0].description;
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById("city").textContent = "Hata!";
                    document.getElementById("temp").textContent = "Bulunamadı";
                    document.getElementById("description").textContent = "Şehir bulunamadı veya bilgi alınamadı.";
                });
        }

        // Sayfa açıldığında varsayılan olarak İzmir'i getir
        getWeather("İzmir");

        // Butona tıklanınca ara
        document.getElementById("searchBtn").addEventListener("click", () => {
            const sehirInput = document.getElementById("cityInput").value.trim();
            getWeather(sehirInput);
        });

        // Enter tuşu ile arama
        document.getElementById("cityInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const sehirInput = document.getElementById("cityInput").value.trim();
                getWeather(sehirInput);
            }
        });
    </script>
</body>

</html>
