<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div style="margin-bottom: 20px;">
        <input type="text" id="cityInput" placeholder="Şehir adı yazın..." style="padding: 8px; font-size: 16px;">
        <button id="searchBtn" style="padding: 8px 12px; font-size: 16px; cursor: pointer;">Ara</button>
    </div>

    <h1 id="city">Yükleniyor...</h1>
    <p id="temp">Yükleniyor...</p>
    <p id="description">Yükleniyor...</p>

    <script>
        const API_KEY = "28c43502b67ebdfcd30e6eab3aaadab8";

        function getWeather(sehir) {
            if (!sehir) return;

            document.getElementById("city").textContent = "Yükleniyor...";
            document.getElementById("temp").textContent = "Yükleniyor...";
            document.getElementById("description").textContent = "Yükleniyor...";

            const URL = `https://api.openweathermap.org/data/2.5/weather?q=${sehir}&appid=${API_KEY}&units=metric&lang=tr`;

            fetch(URL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Şehir bulunamadı veya bir hata oluştu.");
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById("city").textContent = `${data.name}, ${data.sys.country}`;
                    document.getElementById("temp").textContent = `${Math.round(data.main.temp)}°C`;
                    document.getElementById("description").textContent = data.weather[0].description;
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById("city").textContent = "Hata!";
                    document.getElementById("temp").textContent = "Şehir bulunamadı veya bilgi alınamadı.";
                    document.getElementById("description").textContent = "";
                });
        }

        // Sayfa açıldığında varsayılan olarak İzmir'i getir
        getWeather("İzmir");

        // Butona tıklanınca ara
        document.getElementById("searchBtn").addEventListener("click", () => {
            const sehirInput = document.getElementById("cityInput").value.trim();
            getWeather(sehirInput);
        });

        // Enter tuşu ile arama
        document.getElementById("cityInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const sehirInput = document.getElementById("cityInput").value.trim();
                getWeather(sehirInput);
            }
        });
    </script>
</body>

</html>
