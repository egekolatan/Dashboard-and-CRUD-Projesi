<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul {
            /* border: 1px solid red;  /*genel kullanım*/
            /*1px border-width temsil eder*/
            /* border style: solidi temsil eder */
            /* border color: black temsil eder */
            border-width: 5px 3px 4px 7px;
            /*çerçevenin kalınlığını boyutlandırmak istersek üst kenardan başlayarak saat yönünde ilerler*/
            border-style: double solid dashed dotted;
            /*çerçevenin stilini temsil eder her kenarı ayrı ayrı stillendirmke istersek üsst kenardan saat yönünde stillenir*/
            border-color: red black blue pink;
            /*çerçevenin rengini temsil eder her kenarı ayrı ayrı renklendirmek istersek üst kenardan saat yönünde stillenir*/
        }

        div {
            width: 150px;
            height: 150px;
            border: 1px solid black;
            /*border-width border-style border-color
          ayrı ayrı kullanmak yerine tek bir border özelliği altında toplanabilir*/
            border-radius: 0px 30px 0 0;
            overflow: hidden;
            /*bir yapı resim alanı yuvarlak yapmak istersek border radiusu 50% kullanırız ama tam yuvarlak olabilmesi için width ve height
          eşit olmalıdır.overflow mevcut yapıdaki taşmayı engeller */
            /* border radiusun kullanım şekli diğer border özellikleri gibidir
          yani çerçevenin yamukluğu temsil eder her köşeyi ayrı ayrı yamultmak
          istersek sol üst köşeden saat yönünde stillenir */
        }

        img {
            /*img ler her zaman widht 100% kullanımı önerilir */
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div>

        <img src="./aslan.jpg" alt="">
    </div>
    <ul>
        <li>Lorem.</li>
        <li>Id?</li>
        <li>Iure.</li>

    </ul>
</body>

</html>
