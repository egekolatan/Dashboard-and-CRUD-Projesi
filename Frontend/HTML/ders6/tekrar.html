<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Playwrite+AT:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
    <style>
        *{
            /* bütün elementleri kapsar */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        div{
            height: 100vh;
            display: flex;
            /* justify-content: space-between;
            align-items: center; */
        }
        p{
            padding: 20px;
            width: 200px;
            height: 200px;
            border: 1px solid black;
        }
        .bir{
            /* bu yazdığım alttaki kodlarda dahil hepsi yazı tipi yani yazı fontu */
            font-family: serif;
        }
        .iki{
            font-family: sans-serif;
        }
        .uc{
            font-family: monospace;
        }
        .dort{
            font-family: fantasy;
        }
        .bes{
            font-family: "Gravitas One", serif;
  font-weight: 400;
  font-style: normal;
        }

    </style>
</head>
<body>
    <!-- margin padding flex justify-content align-items  -->
    <!-- padding iç boşluk,margin dış boşluk -->
     <!--flex-yan yana getirmeyi sağlıyor -->
     <!-- flex yapısı kpasayıcıya verilir -->
      <!-- kapsayıcıya felx verildiğinde içindeki elemanları yan yana getiriyor -->
       <!-- justify-content x-ekseninde poziyonladırma yapar -->
        <!-- align-items y-ekseninde pozisyonlanmasını sağlar.y ekseninde
         hareket etmek için yükseklik gereklidir -->
         <!-- margin-dış boşluk -->
        
       <div>
        <p class="bir">Lorem, ipsum.</p>
        <p class="iki">Laudantium, neque?</p>
        <p class="uc">Dolores, dolor!</p>
        <p class="dort">Voluptate, pariatur!</p>
        <p class="bes">Lorem, ipsum.</p>
       </div>
</body>
</html>
