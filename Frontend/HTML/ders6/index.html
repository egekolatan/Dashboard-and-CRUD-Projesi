<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            /*text-decoration: overline; üst çizgi */
            /* text-decoration: underline; alt çizgi */
            /* text-decoration:line-through;yazının üsütne çıkar  */
            text-decoration: none; /*yazının etiketini kaldırır */
            color: red;
        }
        div{
            color: pink;
            text-align: center;
        }
        p{
            line-height: 1.5;
            /* line-height satır yüksekliğidir */
        }
    </style>
</head>
<body>
    <a href="">Yönlendirme etiketi</a>
    <div>
        <a href="">Yönlendirme</a>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Blanditiis dignissimos minus deserunt ratione eos voluptates aliquid rerum alias culpa id?</p>
    </div>
</body>
</html>
